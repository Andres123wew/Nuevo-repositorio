<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
</head>
<body>
    <h1>Dias de chamba</h1>
<select id="dia">
    <option value="">Elige una opcion</option> 
    <option value="Lunes">Lunes</option>    
    <option value="Martes">Martes</option>    
    <option value="Miercoles">Miercoles</option>    
    <option value="Jueves">Jueves</option>    
    <option value="viernes">viernes</option>
</select>
    <p id="mensaje"></p>    

 <script>
    const select =document.getElementById("dia");
    const mensaje =document.getElementById("mensaje");

    select.addEventListener("change", function(){
        const dia=select.value;
        switch(dia){
           case "Lunes":
            mensaje.textContent="Inicio de chamba"
            break;

            case "Martes":
            mensaje.textContent="Segunda chamba"
            break;

            case "Miercoles":
            mensaje.textContent="Mitad de chamba"
            break;
            
            case "Jueves":
            mensaje.textContent="Finalizando chamba"
            break;

            case "viernes":
            mensaje.textContent="Final de chamba"
            alert("a farrear")
            break;
            


        }
    })
 </script>
</body>
